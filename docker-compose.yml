services:
  homelab-dashboard:
    build: .
    container_name: homelab-dashboard
    restart: unless-stopped
    ports:
      - "4173:4173"
    networks:
      - proxy
    volumes:
      - homelab-dashboard-data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homelab-dashboard.rule=Host(`homelab.local.jalubru.com`)"
      - "traefik.http.routers.homelab-dashboard.entrypoints=https"
      - "traefik.http.routers.homelab-dashboard.tls=true"
      - "traefik.http.services.homelab-dashboard.loadbalancer.server.port=4173"

volumes:
  homelab-dashboard-data:

networks:
  proxy:
    external: true
