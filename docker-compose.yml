name: jaludash

services:
  jaludash:
    image: jaludash:latest
    build: .
    container_name: jaludash
    restart: unless-stopped
    ports:
      - "4173:4173"
    environment:
      - PROXMOX_API_URL=${PROXMOX_API_URL:-}
      - PROXMOX_NODE=${PROXMOX_NODE:-optipi}
      - PROXMOX_API_TOKEN_ID=${PROXMOX_API_TOKEN_ID:-}
      - PROXMOX_API_TOKEN_SECRET=${PROXMOX_API_TOKEN_SECRET:-}
      - HISTORY_LIMIT=${HISTORY_LIMIT:-1000}
      - SPEED_TEST_URL=${SPEED_TEST_URL:-https://speed.cloudflare.com/__down?bytes=25000000}
      - SPEED_TEST_TIMEOUT_MS=${SPEED_TEST_TIMEOUT_MS:-20000}
      - SPEED_TEST_INTERVAL_MINUTES=${SPEED_TEST_INTERVAL_MINUTES:-0}
    networks:
      - proxy
    volumes:
      - jaludash-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jaludash.rule=Host(`jaludash.local.jalubru.com`)"
      - "traefik.http.routers.jaludash.entrypoints=https"
      - "traefik.http.routers.jaludash.tls=true"
      - "traefik.http.services.jaludash.loadbalancer.server.port=4173"

volumes:
  jaludash-data:

networks:
  proxy:
    external: true
